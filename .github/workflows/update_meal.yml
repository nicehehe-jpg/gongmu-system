name: 매곡테크노파크 식단표 자동 업데이트

on:
  schedule:
    # 매주 월요일 오전 8시 KST (UTC 23:00 일요일)
    - cron: '0 23 * * 0'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update-meal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4 pytz

      - name: 식단표 자동 업데이트 실행
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/update_meal.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "🍱 식단표 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
